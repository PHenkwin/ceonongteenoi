    <style>

            --gold: #c9a84c; --gold-light: #f0d080; --bg-dark: #0a0a0a; --bg-card: #111111;
            --bg-input: #1a1a1a; --border: #2a2a2a; --text: #ffffff; --text-secondary: #888888;
            --red: #e05555; --green: #5ab87a; --blue: #5599ee; --orange: #ee9955;
            --ai-gradient: linear-gradient(135deg, #667eea, #764ba2);
            --shadow: 0 20px 60px rgba(0,0,0,.7); --radius: 12px;
            --font-body: 'Sarabun', system-ui, sans-serif;
            --font-heading: 'Kanit', 'Sarabun', sans-serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .light-theme {
            --bg-dark: #f4f4f6; --bg-card: #ffffff; --bg-input: #f0f0f2;
            --border: #e0e0e0; --text: #111111; --text-secondary: #666666;
            --shadow: 0 8px 30px rgba(0,0,0,.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 15px; }
        body {
            background: var(--bg-dark); color: var(--text);
            font-family: var(--font-body); min-height: 100vh; overflow-x: hidden;
            line-height: 1.7; transition: background 0.3s, color 0.3s;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        .topbar {
            position: sticky; top: 0; z-index: 1000; display: flex; align-items: center;
            gap: 8px; flex-wrap: wrap; padding: 8px 16px;
            background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);

        .light-theme .topbar { background: rgba(255,255,255,0.95); }
        .logo {
            font-family: var(--font-heading); font-size: clamp(18px, 2vw, 22px);
            font-weight: 700; 
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer; white-space: nowrap;
        }
        .spacer { flex: 1; }
        
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px;
            border-radius: 8px; border: 1px solid transparent; cursor: pointer;
            font-size: 12px; font-weight: 600; font-family: var(--font-body);
            transition: var(--transition); white-space: nowrap; text-decoration: none;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--gold); color: #000; border-color: var(--gold); }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
        .btn-ai { background: var(--ai-gradient); color: #fff; border: none; }

        .btn-danger { background: rgba(224,85,85,0.1); border-color: var(--red); color: var(--red); }
        .btn-danger:hover { background: rgba(224,85,85,0.2); }
        .btn-sm { padding: 4px 10px; font-size: 11px; }
        
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }
        .stat-card {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 8px; cursor: pointer;
            transition: var(--transition); text-align: center;

        .stat-card:hover { border-color: var(--gold); transform: translateY(-2px); }
        .stat-value {
            font-family: var(--font-heading); font-size: 20px; font-weight: 700;
        }
        .stat-label {
            font-size: 9px; color: var(--text-secondary); margin-top: 2px;

            display: flex; gap: 2px; padding: 6px 16px 0;
            border-bottom: 1px solid var(--border); background: var(--bg-dark);
            overflow-x: auto;

        .nav-tab {
            padding: 10px 16px; font-size: 12px; font-weight: 600;
            color: var(--text-secondary); cursor: pointer;
            border-bottom: 3px solid transparent; transition: var(--transition);

        .car-grid {

            gap: 14px; padding: 14px;

        .car-card {
            background: var(--bg-card); border: 1px solid var(--border);

        .car-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: rgba(201,168,76,0.3); }

        .car-card.urgent { border-left: 3px solid var(--orange); }
        .car-card.dead-stock { border-left: 3px solid var(--red); }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

        .car-image-wrap {
            position: relative; height: 200px; background: #0d0d0d;

        .car-badge-status {

        .car-meta { display: flex; gap: 6px; flex-wrap: wrap; }

            background: var(--bg-input); border: 1px solid var(--border);

        }
        .car-price-section {
            margin-top: auto; padding-top: 8px;
            border-top: 1px solid var(--border);
            display: flex; align-items: flex-end; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }
        .car-price {
            font-family: var(--font-heading); font-size: 20px; font-weight: 700;
            color: var(--gold-light);
        }
        .car-actions {
            display: flex; gap: 4px; flex-wrap: wrap;

        }
        .car-card:hover .car-actions { opacity: 1; }
        .icon-btn {
            width: 30px; height: 30px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-secondary); font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
        }
        .icon-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
        .icon-btn.active { border-color: var(--gold) !important; color: var(--gold) !important; background: rgba(201,168,76,0.2) !important; }
        
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
            align-items: center; justify-content: center; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; width: 100%; max-width: 550px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8); animation: modalIn 0.25s ease;
        }
        .modal-large { max-width: 850px; }
        @keyframes modalIn {
            from { transform: translateY(20px) scale(0.96); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 16px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        .modal-title {
            font-family: var(--font-heading); font-size: 20px;
            color: var(--gold-light); font-weight: 600;
        }
        .modal-close {
            background: none; border: none; color: var(--text-secondary);
            font-size: 22px; cursor: pointer;
        }
        .modal-close:hover { color: var(--red); }
        
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block; font-size: 10px; color: var(--text-secondary);
            margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px;
            font-weight: 600;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%; padding: 10px 12px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 13px; font-family: var(--font-body);
            transition: var(--transition); outline: none;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            border-color: var(--gold);
        }
        .form-textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
        
        .quick-action-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; padding: 12px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; transition: var(--transition); font-size: 12px;

        }

        .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 9px; font-weight: 600; }

        .tag-recommended { background: #4a90d9; color: #fff; }
        .tag-pricedrop { background: #ff9500; color: #fff; }
        
        @media (max-width: 768px) {
            .car-grid { grid-template-columns: 1fr; padding: 8px; }
            .form-row { grid-template-columns: 1fr; }
            .form-row-3 { grid-template-columns: 1fr; }
        }
    </style>
</head>

    return { ...cost, total: (cost.purchase || 0) + (cost.repair || 0) + (cost.other || 0) };
}

function getProfit(c) {
    if (c.status !== 'sold') return { profit: 0, margin: 0, commission: 0 };
    const net = pp(c.net), cost = getCost(c).total, profit = net - cost;
    return {
        profit,
        margin: net ? (profit / net) * 100 : 0,
        commission: profit * (siteSettings.commissionRate / 100)
    };
}

function getAging(c) {
    return c.dateAdded ? Math.ceil((new Date() - new Date(c.dateAdded)) / 86400000) : 0;
}

function getHotScore(c) {
    if (c.status !== 'show') return 0;
    let score = 50;
    const ag = getAging(c);
    const profit = pp(c.net) - getCost(c).total;
    
    if (ag > CONFIG.site.agingWarning) score -= 2 * (ag - CONFIG.site.agingWarning);
    if (ag > CONFIG.site.agingDead) score -= 30;
    if (profit > 0) score += Math.min(20, profit / 100000);
    if (c.tags?.includes('hot')) score += 15;
    if (c.tags?.includes('recommended')) score += 10;
    if (c.tags?.includes('pricedrop')) score += 5;
    
    return Math.max(0, Math.min(100, Math.round(score)));
}

function toast(m, t = 'success') {
    const container = document.getElementById('toastContainer') || createToastContainer();
    const el = document.createElement('div');
    el.className = `toast toast-${t}`;
    el.style.cssText = `
        padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;
        box-shadow:var(--shadow);animation:toastIn 0.3s ease;
        ${t==='success'?'background:rgba(90,184,122,0.15);border:1px solid rgba(90,184,122,0.3);color:var(--green)':'background:rgba(224,85,85,0.15);border:1px solid rgba(224,85,85,0.3);color:var(--red)'}
    `;
    el.textContent = m;
    container.appendChild(el);
    setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 0.3s';
        setTimeout(() => el.remove(), 300);
    }, 2500);
}

async function handleReg(m) {
    const e = m.querySelector('#regEmail').value.trim();
    const p = m.querySelector('#regPassword').value;
    const pc = m.querySelector('#regPC').value;
    const er = m.querySelector('#regError');
    
    if (!e || !p) { er.textContent = '❌ กรอกข้อมูล'; er.style.display = 'block'; return; }
    if (p.length < 6) { er.textContent = '❌ 6 ตัวขึ้นไป'; er.style.display = 'block'; return; }
    if (p !== pc) { er.textContent = '❌ ไม่ตรง'; er.style.display = 'block'; return; }
    
    try {
        await auth.createUserWithEmailAndPassword(e, p);
        m.remove();
        toast('✅ สมัครสำเร็จ!');
    } catch(ex) {
        er.textContent = '❌ ' + (ex.code === 'auth/email-already-in-use' ? 'อีเมลซ้ำ' : ex.message);
        er.style.display = 'block';
    }
}

async function handleLogin() {
    const e = document.getElementById('authEmail').value.trim();
    const p = document.getElementById('authPassword').value;
    const er = document.getElementById('authError');
    
    if (!e || !p) { er.textContent = '❌ กรอกข้อมูล'; er.style.display = 'block'; return; }
    
    try {
        er.style.display = 'none';
        await auth.signInWithEmailAndPassword(e, p);
        closeM('authModal');
        toast('✅ เข้าสู่ระบบ');
    } catch(ex) {
        er.textContent = '❌ ' + (
            ex.code === 'auth/user-not-found' ? 'ไม่พบบัญชี' :
            ex.code === 'auth/wrong-password' ? 'รหัสผิด' : ex.message
        );
        er.style.display = 'block';
    }
}

        if (u) {
            currentUser = u;

            if (db) {
                try {
                    const snap = await db.ref('users/' + u.uid + '/role').once('value');
                    role = snap.val();
                } catch(e) {}
            }
            if (!role) {
                const localUsers = JSON.parse(localStorage.getItem('sc_users') || '{}');
                if (localUsers[u.uid]) role = localUsers[u.uid].role;
            }
            if (!role) {
                const isFirst = !localStorage.getItem('sc_init');
                role = isFirst ? 'admin' : 'user';
                const userData = { email: u.email, role, createdAt: Date.now() };
                if (db) try { await db.ref('users/' + u.uid).set(userData); } catch(e) {}
                const localUsers = JSON.parse(localStorage.getItem('sc_users') || '{}');
                localUsers[u.uid] = userData;
                localStorage.setItem('sc_users', JSON.stringify(localUsers));
                if (isFirst) {
                    localStorage.setItem('sc_init', 'true');
                    toast('👑 Admin คนแรก!');
                }
            }
            userRole = role;
        } else {
            currentUser = null;
            userRole = 'viewer';
        }
        updateUI();
    });

function getFilteredCars() {
    let filtered = [...cars];
    const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
    
    if (activeFilter !== 'all') filtered = filtered.filter(c => c.brand === activeFilter);
    if (activeStatusFilter) filtered = filtered.filter(c => c.status === activeStatusFilter);
    if (activeTagFilter) filtered = filtered.filter(c => (c.tags || []).includes(activeTagFilter));
    
    if (query) {
        filtered = filtered.filter(c => 
            [c.brand, c.name, c.plate, c.color, c.vin, String(c.year), c.location]
            .some(v => (v || '').toLowerCase().includes(query))
        );
    }
    
    // Sorting
    switch(currentSort) {
        case 'name-asc':
            filtered.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'th'));
            break;
        case 'name-desc':
            filtered.sort((a, b) => (b.name || '').localeCompare(a.name || '', 'th'));
            break;
        case 'price-asc':
            filtered.sort((a, b) => pp(a.net) - pp(b.net));
            break;
        case 'price-desc':
            filtered.sort((a, b) => pp(b.net) - pp(a.net));
            break;
        case 'hot-asc':
            filtered.sort((a, b) => getHotScore(b) - getHotScore(a));
            break;
        case 'age-desc':
            filtered.sort((a, b) => getAging(b) - getAging(a));
            break;
    }
    
    return filtered;
}

// ==================== COMPARE ====================
function toggleCmp(id) {
    const idx = compareIds.indexOf(id);
    if (idx > -1) {
        compareIds.splice(idx, 1);
    } else {
        if (compareIds.length >= CONFIG.site.maxCompare) {
            toast(`สูงสุด ${CONFIG.site.maxCompare} คัน`, 'error');
            return;
        }
        compareIds.push(id);
    }
    sd();
    updateCmpUI();
    renderGrid();
    if (currentTab === 'compare') renderCmp();
}

function updateCmpUI() {
    const floatBtn = document.getElementById('compareFloatBtn');
    const floatCount = document.getElementById('compareFloatCount');
    
    if (floatBtn && floatCount) {
        floatCount.textContent = compareIds.length;
        floatBtn.style.display = compareIds.length > 0 ? 'flex' : 'none';
    }
}

function renderCmp() {
    const content = document.getElementById('compareContent');
    if (!compareIds.length) {
        content.innerHTML = `
            <div style="text-align:center;padding:60px">
                <div style="font-size:48px">⚖️</div>
                <div>ยังไม่ได้เลือกรถ</div>
            </div>`;
        return;
    }
    
    const selected = compareIds.map(id => cars.find(c => c.id === id)).filter(Boolean);
    
    content.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
            <div style="font-weight:600;color:var(--gold)">⚖️ เปรียบเทียบ ${selected.length} คัน</div>
            <div style="display:flex;gap:6px">
                <button class="btn btn-outline btn-sm" onclick="shareCompareLink()">🔗 แชร์</button>
                <button class="btn btn-outline btn-sm" onclick="printCompare()">🖨️ พิมพ์</button>
                <button class="btn btn-danger btn-sm" onclick="clearCompare()">✕ ล้าง</button>
            </div>
        </div>
        <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:12px">
                <thead>
                    <tr>
                        <th style="background:var(--bg-input);color:var(--gold);padding:10px">รายการ</th>
                        ${selected.map(c => `<th style="background:var(--bg-input);color:var(--gold);padding:10px;text-align:center">${esc(c.brand)}<br><small>${esc(c.name)}</small></th>`).join('')}
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="padding:10px;font-weight:600;background:var(--bg-input)">📷 รูปภาพ</td>
                        ${selected.map(c => `<td style="text-align:center"><img src="${addWatermark(c.images?.[0] || PLACEHOLDER_IMG)}" style="width:180px;height:120px;object-fit:cover;border-radius:6px" onerror="this.src='${PLACEHOLDER_IMG}'"></td>`).join('')}
                    </tr>
                    <tr>
                        <td style="padding:10px;font-weight:600;background:var(--bg-input)">📅 ปี</td>
                        ${selected.map(c => `<td style="text-align:center">${c.year}</td>`).join('')}
                    </tr>
                    <tr>
                        <td style="padding:10px;font-weight:600;background:var(--bg-input)">💰 ราคา</td>
                        ${selected.map(c => {
                            const price = pp(c.net);
                            const minPrice = Math.min(...selected.map(s => pp(s.net)));
                            return `<td style="text-align:center;font-size:18px;font-weight:700;${price===minPrice&&selected.length>1?'color:var(--green)':''}">${esc(c.net)} บาท${price===minPrice&&selected.length>1?'<br><span style="font-size:10px">✓ ถูกสุด</span>':''}</td>`;
                        }).join('')}
                    </tr>
                    <tr>
                        <td style="padding:10px;font-weight:600;background:var(--bg-input)">🔥 Hot Score</td>
                        ${selected.map(c => `<td style="text-align:center;font-size:20px;font-weight:700;color:var(--orange)">${getHotScore(c)}</td>`).join('')}
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

function clearCompare() {
    compareIds = [];
    sd();
    updateCmpUI();
    renderGrid();
    renderCmp();
}

function shareCompareLink() {
    if (!compareIds.length) { toast('⚠️ เลือกรถก่อน', 'error'); return; }
    const url = `${location.origin}${location.pathname}?compare=${compareIds.join(',')}`;
    navigator.clipboard?.writeText(url).then(() => toast('🔗 คัดลอกแล้ว!'));
}

function printCompare() {
    if (!compareIds.length) return;
    switchTab('compare');
    setTimeout(() => window.print(), 300);
}

function saveLead(carId) {
    const name = document.getElementById(`leadName${carId}`).value.trim();
    const tel = document.getElementById(`leadTel${carId}`).value.trim();
    
    if (!name) { toast('❌ กรอกชื่อ', 'error'); return; }
    
    if (!crmData[carId]) crmData[carId] = [];
    crmData[carId].push({
        id: uid(),
        name,
        tel,
        status: 'contact',
        date: new Date().toISOString(),
        history: [{ date: new Date().toISOString(), action: 'ลูกค้าสนใจ' }]
    });
    
    sd();
    document.getElementById(`leadModal${carId}`)?.remove();
    renderGrid();
    toast('✅ บันทึกแล้ว');
    
    const c = cars.find(x => x.id === carId);
    if (lineNotifyToken && c) {
        sendLineNotify(`👤 ลูกค้าสนใจ!\n🚗 ${c.brand} ${c.name}\n💰 ${c.net} บาท\n👤 ${name}\n📱 ${tel}`);
    }
}

function quickCalc(carId, price) {
    const dp = parseInt(document.getElementById(`qDown${carId}`)?.value) || 15;
    const m = parseInt(document.getElementById(`qTerm${carId}`)?.value) || 60;
    const ar = parseFloat(document.getElementById(`qRate${carId}`)?.value) || 3;
    const useAPR = document.getElementById(`qAPR${carId}`)?.checked || false;
    
    let result;
    if (useAPR) {
        const down = price * dp / 100;
        const loan = price - down;
        const monthlyRate = ar / 1200;
        const factor = Math.pow(1 + monthlyRate, m);
        const mp = loan * (monthlyRate * factor) / (factor - 1);
        result = { mp, total: mp * m, interest: mp * m - loan };
    } else {
        const down = price * dp / 100;
        const loan = price - down;
        const years = m / 12;
        const totalInterest = loan * (ar / 100) * years;
        const totalPayment = loan + totalInterest;
        const mp = totalPayment / m;
        result = { mp, total: totalPayment, interest: totalInterest };
    }
    
    const downVal = document.getElementById(`qDownVal${carId}`);
    const monthly = document.getElementById(`qMonthly${carId}`);
    const detail = document.getElementById(`qDetail${carId}`);
    
    if (downVal) downVal.textContent = `${dp}% - ${fm(price * dp / 100)}`;
    if (monthly) monthly.textContent = fm(Math.round(result.mp)) + '/ด.';
    if (detail) detail.textContent = `ดอกเบี้ยรวม: ${fm(Math.round(result.interest))} | รวมจ่าย: ${fm(Math.round(result.total))} | ${useAPR ? 'APR' : 'Flat Rate'}`;
    
    window._lastCalc = result;
    window._lastCarId = carId;
}

function handleAddCar() {
    const name = document.getElementById('carName').value.trim();

    const net = document.getElementById('carNet').value.trim() || '0';
    
    if (!name) { toast('❌ กรอกชื่อรุ่น', 'error'); return; }
    
    const car = {
        id: Date.now(),
        brand,
        name,
        year: parseInt(document.getElementById('carYear').value) || new Date().getFullYear(),
        color: document.getElementById('carColor').value.trim() || '-',
        plate: document.getElementById('carPlate').value.trim() || '',
        vin: document.getElementById('carVIN').value.trim() || '',
        mileage: document.getElementById('carMileage').value.trim() || '-',
        sp: document.getElementById('carSP').value.trim() || net,
        net,
        location: document.getElementById('carLocation').value.trim() || '',
        warranty: { end: document.getElementById('carWarranty').value.trim() || '', type: 'dealer' },
        note: document.getElementById('carNote').value.trim() || '',
        status: 'show',
        images: pendingCarImgs.length ? [...pendingCarImgs] : [PLACEHOLDER_IMG],
        documents: [...pendingCarDocs],

            purchase: hasPerm('commission') ? pp(document.getElementById('carCostPurchase')?.value) : 0,
            repair: hasPerm('commission') ? pp(document.getElementById('carCostRepair')?.value) : 0,
            other: hasPerm('commission') ? pp(document.getElementById('carCostOther')?.value) : 0

        dateAdded: new Date().toISOString().split('T')[0],
        soldDate: null,
        tags: Array.from(document.getElementById('carTags')?.selectedOptions || []).map(o => o.value),
        salesPerson: currentUser?.email?.split('@')[0] || ''

    cars.unshift(car);

    pendingCarDocs = [];

    renderAll();

// ==================== IMAGE HANDLING ====================
function handleCarImageUpload(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    if (pendingCarImgs.length + files.length > CONFIG.site.maxImages) {
        toast(`สูงสุด ${CONFIG.site.maxImages} รูป`, 'error');
        return;
    }
    
    files.forEach(f => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxSize = 1024;
                let w = img.width, h = img.height;
                
                if (w > maxSize || h > maxSize) {
                    const ratio = Math.min(maxSize / w, maxSize / h);
                    w = Math.round(w * ratio);
                    h = Math.round(h * ratio);
                }
                
                canvas.width = w;
                canvas.height = h;
                
                // Add watermark if user has permission
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                
                if (hasPerm('watermark')) {
                    ctx.font = '24px Sarabun';
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.textAlign = 'right';
                    ctx.fillText(siteSettings.name, w - 20, h - 20);
                }
                
                pendingCarImgs.push(canvas.toDataURL('image/jpeg', 0.8));
                renderThumbs();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(f);
    });
    input.value = '';
}

function openCamera() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.onchange = function(e) {
        handleCarImageUpload({ target: { files: e.target.files } });
    };
    input.click();
}

function addImgURL() {
    const urlInput = document.getElementById('carImageURL');
    if (!urlInput) return;
    
    const url = urlInput.value.trim();
    if (!url) return;
    if (pendingCarImgs.length >= CONFIG.site.maxImages) {
        toast(`สูงสุด ${CONFIG.site.maxImages} รูป`, 'error');
        return;
    }
    
    pendingCarImgs.push(url);
    urlInput.value = '';
    renderThumbs();
}

function renderThumbs() {
    const container = document.getElementById('carImageThumbs');

    if (!pendingCarImgs.length) {
        container.innerHTML = '<span style="font-size:10px;color:var(--text-secondary)">ยังไม่มีรูป</span>';

    container.innerHTML = pendingCarImgs.map((src, i) => `
        <div style="width:50px;height:50px;border-radius:4px;overflow:hidden;position:relative;cursor:pointer"

// ==================== DOCUMENT HANDLING ====================
function handleCarDocUpload(input) {
    const files = Array.from(input.files);
    if (!files.length) return;
    
    files.forEach(f => {
        const reader = new FileReader();
        reader.onload = function(e) {
            pendingCarDocs.push({
                name: f.name,
                type: f.type,
                url: e.target.result,
                size: f.size
            });
            renderDocList();
        };
        reader.readAsDataURL(f);
    });
    input.value = '';
}

function renderDocList() {
    const container = document.getElementById('carDocList');
    if (!container) return;
    
    container.innerHTML = pendingCarDocs.map((d, i) => `

async function sendAIMessage() {
    const input = document.getElementById('aiChatInput');
    if (!input) return;
    
    const msg = input.value.trim();
    if (!msg) return;
    
    input.value = '';
    aiChatHistory.push({ role: 'user', content: msg });
    
    const msgsEl = document.getElementById('aiChatMessages');
    if (!msgsEl) return;
    
    // Show user message
    msgsEl.innerHTML = aiChatHistory.map(m => `
        <div style="max-width:80%;padding:10px 14px;border-radius:12px;font-size:12px;align-self:${m.role==='user'?'flex-end':'flex-start'};background:${m.role==='user'?'var(--gold)':'var(--bg-input)'};color:${m.role==='user'?'#000':'var(--text)'}">${m.content}</div>
    `).join('');
    
    // Show typing indicator
    msgsEl.innerHTML += '<div style="display:flex;gap:4px;padding:10px" id="typingIndicator"><span style="animation:typing 1.4s infinite;width:6px;height:6px;border-radius:50%;background:var(--text-secondary)"></span><span style="animation:typing 1.4s infinite 0.2s;width:6px;height:6px;border-radius:50%;background:var(--text-secondary)"></span><span style="animation:typing 1.4s infinite 0.4s;width:6px;height:6px;border-radius:50%;background:var(--text-secondary)"></span></div>';
    
    // Call AI
    const carInfo = cars.map(c => `${c.brand} ${c.name} ปี ${c.year} ${c.color} ไมล์ ${c.mileage} ราคา ${c.net} สถานะ ${c.status}`).join('\n');
    const reply = await callOpenAI([
        { role: 'system', content: `คุณคือ AI ผู้ช่วยร้านขายรถ "${siteSettings.name}" ตอบคำถามเกี่ยวกับรถในสต็อก: ${carInfo}` },
        { role: 'user', content: msg }
    ]);
    
    document.getElementById('typingIndicator')?.remove();
    aiChatHistory.push({ role: 'ai', content: reply || 'ขออภัย ไม่สามารถตอบได้' });
    
    if (aiChatHistory.length > 50) aiChatHistory = aiChatHistory.slice(-50);
    sd();
    
    msgsEl.innerHTML = aiChatHistory.map(m => `
        <div style="max-width:80%;padding:10px 14px;border-radius:12px;font-size:12px;align-self:${m.role==='user'?'flex-end':'flex-start'};background:${m.role==='user'?'var(--gold)':'var(--bg-input)'};color:${m.role==='user'?'#000':'var(--text)'}">${m.content}</div>
    `).join('');
    msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function callOpenAI(messages) {
    if (!openaiKey) {
        toast('⚠️ ตั้งค่า OpenAI API Key ก่อน', 'error');
        return '❌ ไม่มี API Key';
    }
    
    try {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + openaiKey
            },
            body: JSON.stringify({
                model: 'gpt-3.5-turbo',
                messages,
                temperature: 0.7,
                max_tokens: 500
            })
        });
        const data = await res.json();
        return data.choices?.[0]?.message?.content || 'ขออภัย ไม่สามารถประมวลผลได้';
    } catch(e) {
        return '❌ เกิดข้อผิดพลาด: ' + e.message;
    }
}

// ==================== ALERTS ====================
function getAlerts() {
    const alerts = [];
    const now = new Date();
    
    cars.forEach(c => {
        // Warranty alerts
        if (c.warranty?.end) {
            try {
                const parts = c.warranty.end.split('/');
                const endDate = new Date(parseInt(parts[2]) - 543, parseInt(parts[1]) - 1, parseInt(parts[0]));
                const daysLeft = Math.ceil((endDate - now) / 86400000);
                
                if (daysLeft <= 0) {
                    alerts.push({ type: 'danger', icon: '⚠️', msg: `Warranty หมดอายุ: ${c.brand} ${c.name}`, carId: c.id });
                } else if (daysLeft <= 30) {
                    alerts.push({ type: 'warning', icon: '⏳', msg: `Warranty ใกล้หมด: ${c.brand} ${c.name} (${daysLeft} วัน)`, carId: c.id });
                }
            } catch(e) {}
        }
        
        // Aging alerts
        if (c.status === 'show') {
            const ag = getAging(c);
            if (ag > CONFIG.site.agingDead) {
                alerts.push({ type: 'danger', icon: '📦', msg: `Dead Stock ${ag} วัน: ${c.brand} ${c.name}`, carId: c.id });
            } else if (ag > CONFIG.site.agingWarning) {
                alerts.push({ type: 'warning', icon: '⏰', msg: `จอดนาน ${ag} วัน: ${c.brand} ${c.name}`, carId: c.id });
            }
        }
    });
    
    return alerts;
}

function checkAlerts() {
    const alerts = getAlerts();
    const container = document.getElementById('alertsContent');
    if (!container) return;
    
    if (!alerts.length) {
        container.innerHTML = `
            <div style="text-align:center;padding:40px;color:var(--text-secondary)">
                <div style="font-size:36px">✅</div>

    container.innerHTML = alerts.map(a => `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:6px;
                    background:var(--bg-input);border:1px solid ${a.type==='danger'?'var(--red)':'var(--orange)'};

function backupData() {

        version: '2.0'

    toast('💾 สำรองข้อมูลเรียบร้อย');

function restoreDataPrompt() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = function(e) {
        const f = e.target.files[0];
        if (!f) return;
        
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const d = JSON.parse(ev.target.result);
                if (d.cars) {
                    cars = d.cars;
                    if (d.crmData) crmData = d.crmData;
                    if (d.appointments) appointments = d.appointments;
                    if (d.siteSettings) siteSettings = d.siteSettings;
                    if (d.lineNotifyToken) lineNotifyToken = d.lineNotifyToken;
                    if (d.compareIds) compareIds = d.compareIds;
                    if (d.theme) { theme = d.theme; applyTheme(); }
                    sd();
                    renderAll();
                    toast('📥 กู้คืนข้อมูลสำเร็จ', 'success');
                } else {
                    toast('❌ ไฟล์ไม่ถูกต้อง', 'error');
                }
            } catch(ex) {
                toast('❌ ไฟล์ไม่ถูกต้อง', 'error');
            }
        };
        reader.readAsText(f);
    };
    input.click();
}

// ==================== LINE NOTIFY ====================
async function sendLineNotify(msg) {
    if (!lineNotifyToken) return;
    try {
        await fetch('https://notify-api.line.me/api/notify', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${lineNotifyToken}` },
            body: `message=${encodeURIComponent(msg)}`
        });
    } catch(e) {}
}

// ==================== SETTINGS ====================
function showSet() {
    const modalHtml = `
    <div class="modal-overlay open" onclick="if(event.target===this)this.remove()" style="z-index:3000">
        <div class="modal" style="max-width:450px">
            <div class="modal-header">
                <div class="modal-title">⚙️ ตั้งค่าระบบ</div>
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
            </div>
            <div class="form-group"><label class="form-label">ชื่อร้าน</label><input type="text" class="form-input" id="setName" value="${esc(siteSettings.name)}"></div>
            <div class="form-group"><label class="form-label">เบอร์โทร</label><input type="text" class="form-input" id="setPhone" value="${siteSettings.phone}"></div>
            <div class="form-group"><label class="form-label">LINE ID</label><input type="text" class="form-input" id="setLineId" value="${siteSettings.lineId}"></div>
            <div class="form-group"><label class="form-label">คอมมิชชั่น (%)</label><input type="number" class="form-input" id="setCom" value="${siteSettings.commissionRate}" min="0" max="100" step="0.5"></div>
            <div class="form-group"><label class="form-label">LINE Notify Token</label><input type="text" class="form-input" id="setLineToken" value="${lineNotifyToken}"></div>
            <div class="form-group"><label class="form-label">🤖 OpenAI Key</label><input type="text" class="form-input" id="setOAI" value="${openaiKey}"></div>
            <div style="display:flex;gap:8px">
                <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()" style="flex:1">ยกเลิก</button>
                <button class="btn btn-primary" onclick="saveSet(this.closest('.modal-overlay'))" style="flex:1">บันทึก</button>
            </div>
        </div>
    </div>`;
    
    document.getElementById('detailModalContainer').insertAdjacentHTML('beforeend', modalHtml);
}

function saveSet(modal) {
    siteSettings.name = modal.querySelector('#setName').value || CONFIG.site.name;
    siteSettings.phone = modal.querySelector('#setPhone').value || CONFIG.site.phone;
    siteSettings.lineId = modal.querySelector('#setLineId').value || CONFIG.site.lineId;
    siteSettings.commissionRate = parseFloat(modal.querySelector('#setCom').value) || 5;
    lineNotifyToken = modal.querySelector('#setLineToken').value.trim();
    openaiKey = modal.querySelector('#setOAI').value.trim();
    
    sd();
    modal.remove();
    renderAll();
    toast('✅ บันทึกแล้ว');
}

function handleLogoClick() {
    const name = prompt('ชื่อร้าน:', siteSettings.name);
    if (name && name.trim()) {
        siteSettings.name = name.trim();
        sd();
        renderAll();
        toast('✅ เปลี่ยนแล้ว');
    }
}

function refreshAll() {
    ld();
    renderAll();
    toast('✅ รีเฟรชแล้ว');
}

function recommendCarsForCustomer() {
    const budget = parseInt(prompt('💰 งบประมาณ (บาท):') || '0');
    if (!budget) return;
    
    const brand = prompt('🏷️ ยี่ห้อ (เว้นว่างได้):') || '';
    const year = parseInt(prompt('📅 ปีขั้นต่ำ (เว้นว่างได้):') || '0');
    
    let suitable = cars.filter(c => c.status === 'show' && pp(c.net) <= budget);
    if (brand) suitable = suitable.filter(c => c.brand === brand);
    if (year) suitable = suitable.filter(c => c.year >= year);
    
    suitable.sort((a, b) => pp(a.net) - pp(b.net));
    const top5 = suitable.slice(0, 5);
    
    if (!top5.length) { toast('❌ ไม่พบรถ', 'error'); return; }
    
    activeFilter = 'all';
    activeStatusFilter = '';
    activeTagFilter = '';
    document.getElementById('searchInput').value = brand || '';
    
    toast(`🤖 แนะนำ ${top5.length} คัน`);
    renderGrid();
    
    top5.forEach((c, i) => {
        setTimeout(() => {
            const el = document.getElementById('card-' + c.id);
            if (el) {
                el.style.boxShadow = '0 0 20px rgba(118,75,162,0.5)';
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => el.style.boxShadow = '', 3000);
            }
        }, i * 300);
    });
}

// ==================== USER MANAGEMENT ====================
async function showUM() {
    if (!hasPerm('users')) return;
    
    let users = {};
    if (fbReady && db && currentUser) {
        try {
            const snap = await db.ref('users').once('value');
            users = snap.val() || {};
        } catch(e) {}
    }
    
    if (!Object.keys(users).length) {
        users = JSON.parse(localStorage.getItem('sc_users') || '{}');
    }
    
    const list = Object.entries(users);
    
    const modalHtml = `
    <div class="modal-overlay open" onclick="if(event.target===this)this.remove()" style="z-index:3000">
        <div class="modal" style="max-width:600px">
            <div class="modal-header">
                <div class="modal-title">👥 จัดการผู้ใช้</div>
                <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
            </div>
            <div style="max-height:400px;overflow-y:auto;margin-bottom:12px">
                ${list.length === 0 ? 
                    '<div style="text-align:center;padding:30px;color:var(--text-secondary)">ยังไม่มีผู้ใช้</div>' :
                    list.map(([uid, data]) => {
                        const role = data.role || 'viewer';
                        const isMe = uid === currentUser?.uid;
                        return `
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;margin-bottom:6px;background:var(--bg-input);border:1px solid ${isMe?'var(--gold)':'var(--border)'};border-radius:8px">
                            <div>
                                <div style="font-weight:600;font-size:12px">
                                    ${data.email || 'ไม่ระบุ'}
                                    ${isMe ? '<span style="background:var(--gold);color:#000;padding:1px 5px;border-radius:3px;font-size:8px;margin-left:4px">คุณ</span>' : ''}
                                </div>
                                <div style="font-size:9px;color:var(--text-secondary)">${PERMISSIONS[role]?.label || role}</div>
                            </div>
                            <div style="display:flex;gap:4px;align-items:center">
                                <select onchange="chRole('${uid}',this.value)" style="padding:5px 8px;background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px" ${isMe?'disabled':''}>
                                    <option value="admin" ${role==='admin'?'selected':''}>👑 Admin</option>
                                    <option value="user" ${role==='user'?'selected':''}>👤 User</option>
                                    <option value="viewer" ${role==='viewer'?'selected':''}>👁️ Viewer</option>
                                </select>
                                ${!isMe ? `<button onclick="deleteUser('${uid}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:4px">🗑️</button>` : ''}
                            </div>
                        </div>`;
                    }).join('')
                }
            </div>
            <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()" style="width:100%">ปิด</button>
        </div>
    </div>`;
    
    document.getElementById('detailModalContainer').insertAdjacentHTML('beforeend', modalHtml);
}

async function chRole(uid, newRole) {
    if (!hasPerm('users')) return;
    
    if (fbReady && db) {
        try { await db.ref('users/' + uid + '/role').set(newRole); } catch(e) {}
    }
    
    const localUsers = JSON.parse(localStorage.getItem('sc_users') || '{}');
    if (localUsers[uid]) {
        localUsers[uid].role = newRole;
        localStorage.setItem('sc_users', JSON.stringify(localUsers));
    }
    
    if (uid === currentUser?.uid) {
        userRole = newRole;
        updateUI();
    }
    
    toast('✅ เปลี่ยนสิทธิ์แล้ว');
}

async function deleteUser(uid) {
    if (!hasPerm('users')) return;
    if (uid === currentUser?.uid) { toast('❌ ลบตัวเองไม่ได้', 'error'); return; }
    if (!confirm('ยืนยันการลบผู้ใช้?')) return;
    
    if (fbReady && db) {
        try { await db.ref('users/' + uid).remove(); } catch(e) {}
    }
    
    const localUsers = JSON.parse(localStorage.getItem('sc_users') || '{}');
    delete localUsers[uid];
    localStorage.setItem('sc_users', JSON.stringify(localUsers));
    
    toast('🗑️ ลบแล้ว');
}

// ==================== INIT ====================
function init() {
    ld();
    
    // Create container for dynamic modals
    if (!document.getElementById('detailModalContainer')) {
        const container = document.createElement('div');
        container.id = 'detailModalContainer';
        document.body.appendChild(container);
    }
    
    // Create toast container
    if (!document.getElementById('toastContainer')) {
        createToastContainer();
    }
    
    updateUI();
    renderNav();
    renderAll();
    
    // Check for compare links in URL
    const params = new URLSearchParams(window.location.search);
    const cParam = params.get('compare');
    if (cParam) {
        compareIds = cParam.split(',').map(Number).filter(id => cars.find(c => c.id === id)).slice(0, CONFIG.site.maxCompare);
        updateCmpUI();
        if (compareIds.length) setTimeout(() => switchTab('compare'), 500);
    }
    
    switchTab('landing');
    
    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal-overlay.open').forEach(m => m.remove());
            document.querySelectorAll('.user-dropdown').forEach(el => el.remove());
        }
        if (e.ctrlKey && e.key === 'k') {
            e.preventDefault();
            document.getElementById('searchInput')?.focus();
        }
    });
}

document.addEventListener('DOMContentLoaded', init);
</script>

        to { transform: translateY(0); opacity: 1; }
