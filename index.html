<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Stock CEO - ระบบจัดการสต็อกรถมือสองอัจฉริยะ">
    <title>Stock CEO - ระบบจัดการสต็อกรถ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    <link rel="manifest" href="manifest.json">
    
    <!-- CSS หลัก -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="view-mode">
    <!-- === TOP BAR === -->
    <div class="topbar">
        <div id="logoArea" style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="window.handleLogoClick()">
            <div id="logoImgWrap" style="display:none;width:clamp(28px, 3.5vw, 32px);height:clamp(28px, 3.5vw, 32px);border-radius:6px;overflow:hidden;flex-shrink:0;border:1px solid rgba(201,168,76,.3)">
                <img id="logoImg" src="" style="width:100%;height:100%;object-fit:contain;background:#111" alt="Logo">
            </div>
            <div id="logoText" class="logo" style="white-space:nowrap">Stock CEO</div>
        </div>
        
        <div class="sync-status-bar disconnected" id="syncStatusBar" onclick="window.openSyncModal()">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncLabel">ไม่ได้เชื่อมต่อ</span>
        </div>
        <div id="saveStatus" style="font-size:clamp(8px, 1vw, 10px);letter-spacing:0.5px;min-width:clamp(50px, 8vw, 70px)"></div>
        
        <div class="auth-section" id="authSection">
            <button class="btn btn-outline" onclick="window.showAuthModal()" style="font-size:clamp(9px, 1.1vw, 10px);padding:clamp(4px, 0.6vw, 6px) clamp(8px, 1vw, 9px)">🔑 เข้าสู่ระบบ</button>
        </div>
        
        <div class="topbar-date">📅 <input type="date" id="stockDate"></div>
        <div class="spacer"></div>
        
        <div class="search-wrap">
            <span class="si">🔍</span>
            <input type="text" placeholder="ค้นหารถ..." id="searchInput" inputmode="text">
        </div>
        
        <select id="sortSelect" onchange="window.handleSort()" style="background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:clamp(3px, 0.5vw, 5px);color:var(--text-primary);font-size:clamp(9px, 1.1vw, 10px);outline:none;font-family:inherit">
            <option value="name-asc">🔤 ชื่อ ก-ฮ</option>
            <option value="name-desc">🔤 ชื่อ ฮ-ก</option>
            <option value="price-asc">💰 ต่ำ→สูง</option>
            <option value="price-desc">💰 สูง→ต่ำ</option>
            <option value="year-desc">📅 ใหม่→เก่า</option>
            <option value="year-asc">📅 เก่า→ใหม่</option>
        </select>
        
        <button class="lock-btn locked" id="lockBtn" onclick="window.handleLockClick()">🔒 ดูอย่างเดียว</button>
        <button class="btn btn-outline" id="changePinBtn" onclick="window.startChangePin()" style="display:none;font-size:clamp(9px, 1.1vw, 10px);padding:clamp(4px, 0.6vw, 6px) clamp(8px, 1vw, 9px)">🔑 PIN</button>
        <button class="btn btn-outline" onclick="window.toggleTheme()" title="สลับธีม" style="font-size:clamp(9px, 1.1vw, 10px);padding:clamp(4px, 0.6vw, 6px) clamp(6px, 0.8vw, 8px)">🌓</button>
        <button class="btn btn-outline" onclick="window.toggleView()" title="สลับมุมมอง" style="font-size:clamp(9px, 1.1vw, 10px);padding:clamp(4px, 0.6vw, 6px) clamp(6px, 0.8vw, 8px)">🔲</button>
        
        <select id="gridSizeSelect" onchange="window.changeGridSize()" style="background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:clamp(3px, 0.5vw, 5px);color:var(--text-primary);font-size:clamp(9px, 1.1vw, 10px);outline:none;font-family:inherit">
            <option value="small">⬜ เล็ก</option>
            <option value="medium" selected>🟫 กลาง</option>
            <option value="large">⬛ ใหญ่</option>
        </select>
    </div>

    <!-- === VIEW BANNER === -->
    <div class="view-banner">👁️ โหมดดูอย่างเดียว</div>

    <!-- === STATS BAR === -->
    <div class="stats" id="statsBar"></div>

    <!-- === NAV TABS === -->
    <div class="nav-tabs">
        <div class="nav-tab active" id="tab-stock" onclick="window.switchTab('stock')">📦 สต็อกรถ</div>
        <div class="nav-tab" id="tab-report" onclick="window.switchTab('report')">📊 รายงาน</div>
        <div class="nav-tab" id="tab-compare" onclick="window.switchTab('compare')">⚖️ เปรียบเทียบ</div>
        <div class="nav-tab" id="tab-alerts" onclick="window.switchTab('alerts')">🔔 การแจ้งเตือน</div>
    </div>

    <!-- === RESULT INFO === -->
    <div class="result-info" id="resultInfo">
        <span>แสดง <span class="result-count" id="resultCount">0</span> รายการ</span>
        <span style="margin-left:auto" id="activeFilters"></span>
    </div>

    <!-- === STOCK PANEL === -->
    <div id="stockPanel">
        <div class="filters" id="filterChips">
            <div class="range-filter">💰 ราคา: 
                <input type="number" id="filterPriceMin" placeholder="ต่ำสุด" oninput="window.debounceFilter()" inputmode="numeric"> - 
                <input type="number" id="filterPriceMax" placeholder="สูงสุด" oninput="window.debounceFilter()" inputmode="numeric">
            </div>
            <div class="range-filter">📅 ปี: 
                <input type="number" id="filterYearMin" placeholder="จาก" oninput="window.debounceFilter()" inputmode="numeric"> - 
                <input type="number" id="filterYearMax" placeholder="ถึง" oninput="window.debounceFilter()" inputmode="numeric">
            </div>
            <button class="btn btn-outline" onclick="window.clearFilters()" style="font-size:clamp(9px, 1.1vw, 10px);padding:clamp(3px, 0.4vw, 4px) clamp(6px, 0.8vw, 8px)">✕ ล้าง</button>
        </div>
        
        <!-- Skeleton Loader -->
        <div class="skeleton-grid" id="skeletonLoader">
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
            <div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line w60"></div><div class="skeleton-line w80"></div><div class="skeleton-line w40"></div></div>
        </div>
        
        <!-- Car Grid -->
        <div class="grid" id="carGrid" style="display:none"></div>
    </div>

    <!-- === REPORT PANEL === -->
    <div id="reportPanel"><div class="report-grid" id="reportCards"></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:clamp(10px, 1.2vw, 14px)" id="reportCharts"></div></div>

    <!-- === COMPARE PANEL === -->
    <div id="comparePanel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(8px, 1vw, 12px);flex-wrap:wrap;gap:clamp(6px, 1vw, 8px)">
            <div>
                <div style="font-size:clamp(12px, 1.5vw, 14px);font-weight:700;color:var(--text-primary)">⚖️ เปรียบเทียบรถ</div>
                <div style="font-size:clamp(9px, 1.1vw, 10px);color:var(--text-secondary);margin-top:2px">กดปุ่ม ⚖️ บนการ์ดรถเพื่อเลือก (สูงสุด 3 คัน)</div>
            </div>
            <button class="btn btn-outline" onclick="window.clearCompare()" style="font-size:clamp(9px, 1.1vw, 10px);padding:clamp(4px, 0.5vw, 5px) clamp(6px, 0.8vw, 8px)">✕ ล้าง</button>
        </div>
        <div id="compareTable"></div>
    </div>

    <!-- === ALERTS PANEL === -->
    <div id="alertsPanel" style="display:none;padding:clamp(12px, 1.5vw, 16px) clamp(12px, 2vw, 20px) 60px">
        <div style="font-size:clamp(12px, 1.5vw, 14px);font-weight:700;color:var(--text-primary);margin-bottom:clamp(8px, 1vw, 12px)">🔔 การแจ้งเตือนอัจฉริยะ</div>
        <div class="alert-list" id="alertList"></div>
        <div style="margin-top:clamp(12px, 1.5vw, 16px);text-align:center;font-size:clamp(10px, 1.2vw, 11px);color:var(--text-secondary)">💡 ระบบจะตรวจสอบอัตโนมัติเมื่อโหลดหน้าเว็บ</div>
    </div>

    <!-- === MODALS (ซ่อนไว้ก่อน) === -->
    <!-- Lightbox -->
    <div id="lightbox" style="display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.97);flex-direction:column;backdrop-filter:blur(6px)">
        <div class="lightbox-header">
            <div>
                <div id="lbBrand" style="font-size:clamp(8px, 1vw, 9px);letter-spacing:1.2px;color:var(--gold);font-weight:700;margin-bottom:2px"></div>
                <div id="lbName" style="font-family:'Playfair Display',serif;font-size:clamp(13px, 1.7vw, 15px);color:#f0ead8;font-weight:700"></div>
            </div>
            <div style="display:flex;align-items:center;gap:clamp(6px, 0.8vw, 8px)">
                <div id="lbCounter" style="font-size:clamp(9px, 1.1vw, 11px);color:var(--text-secondary)"></div>
                <button onclick="window.closeLightbox()" class="lb-close-btn">✕</button>
            </div>
        </div>
        <div class="lightbox-content">
            <button id="lbPrev" class="nav-btn left" onclick="window.lbNav(-1)">‹</button>
            <div class="img-container"><img id="lbImg" class="lb-img" src="" alt=""></div>
            <button id="lbNext" class="nav-btn right" onclick="window.lbNav(1)">›</button>
            <div id="lbThumbPanel" class="thumb-panel"></div>
        </div>
        <div id="lbDots" class="dots"></div>
        <div id="lbEditSection" class="edit-section">
            <div style="display:flex;gap:clamp(4px, 0.6vw, 6px);align-items:center;flex-wrap:wrap">
                <button onclick="document.getElementById('lbFileInput').click()" class="lb-upload-btn">📁 อัพโหลด</button>
                <input type="file" id="lbFileInput" accept="image/*" multiple style="display:none">
                <input type="text" id="lbUrlInput" placeholder="วาง URL…" class="lb-url-input">
                <button onclick="window.lbApplyUrl()" class="lb-add-btn">เพิ่ม</button>
                <button id="lbDelBtn" onclick="window.lbDeleteCurrent()" class="lb-del-btn">🗑️ ลบ</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <!-- Floating Contact -->
    <button class="floating-contact" onclick="window.openContactModal()" title="ติดต่อเรา">📞</button>

    <!-- Upload Progress -->
    <div class="upload-progress" id="uploadProgress">
        <div style="font-size:clamp(11px, 1.3vw, 12px);font-weight:600;color:var(--gold)">📤 กำลังอัพโหลด...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div style="font-size:clamp(9px, 1.1vw, 10px);color:var(--text-secondary)" id="progressText">0%</div>
    </div>

    <!-- Modal Container (สร้างด้วย JS) -->
    <div id="modalContainer"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

    <!-- Application Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage-service.js"></script>
    <script src="js/firebase-service.js"></script>
    <script src="js/car-model.js"></script>
    <script src="js/ui-render.js"></script>
    <script src="js/ui-modal.js"></script>
    <script src="js/crm.js"></script>
    <script src="js/quote-engine.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>

    <!-- Service Worker Registration -->
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
    }
    </script>
</body>
</html>
