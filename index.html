<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Stock CEO Ultimate - ระบบจัดการสต็อกรถมือสองอัจฉริยะ ครบวงจร พร้อมระบบสมาชิก">
    <title>Stock CEO Ultimate</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c9a84c; --gold-light: #f0d080; --gold-dark: #a08020;
            --bg-dark: #0a0a0a; --bg-card: #111111; --bg-input: #1a1a1a;
            --border: #2a2a2a; --text-primary: #ffffff; --text-secondary: #888888;
            --red: #e05555; --green: #5ab87a; --blue: #5599ee; --orange: #ee9955;
            --purple: #aa77ee; --shadow: 0 20px 60px rgba(0,0,0,.7);
            --radius: 12px; --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 14px; }
        body {
            background: var(--bg-dark); color: var(--text-primary);
            font-family: 'Noto Sans Thai', system-ui, sans-serif;
            min-height: 100vh; overflow-x: hidden; line-height: 1.6;
            transition: background 0.3s, color 0.3s;
        }
        
        /* TOPBAR */
        .topbar {
            position: sticky; top: 0; z-index: 1000;
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 8px 16px; background: rgba(10,10,10,0.95);
            border-bottom: 1px solid var(--border); backdrop-filter: blur(12px);
        }
        .logo {
            font-family: 'Playfair Display', serif; font-size: clamp(18px, 2vw, 22px);
            font-weight: 900; background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            cursor: pointer; white-space: nowrap;
        }
        .spacer { flex: 1; }
        
        /* BUTTONS */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 14px; border-radius: 8px; border: 1px solid transparent;
            cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit;
            transition: var(--transition); white-space: nowrap; text-decoration: none;
        }
        .btn-primary { background: var(--gold); color: #000; border-color: var(--gold); }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger { background: rgba(224,85,85,0.1); border-color: rgba(224,85,85,0.2); color: var(--red); }
        .btn-success { background: rgba(90,184,122,0.1); border-color: rgba(90,184,122,0.2); color: var(--green); }
        .btn-sm { padding: 4px 8px; font-size: 10px; }
        
        /* STATS */
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }
        .stat-card {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 8px; padding: 12px; cursor: pointer;
            transition: var(--transition); text-align: center;
        }
        .stat-card:hover { border-color: var(--gold); transform: translateY(-2px); }
        .stat-value { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; }
        .stat-label { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
        
        /* NAV */
        .nav-tabs {
            display: flex; gap: 2px; padding: 8px 16px 0;
            border-bottom: 1px solid var(--border); background: var(--bg-dark);
            overflow-x: auto;
        }
        .nav-tab {
            padding: 10px 20px; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); cursor: pointer;
            border-bottom: 3px solid transparent; transition: var(--transition);
            white-space: nowrap;
        }
        .nav-tab:hover { color: var(--text-primary); }
        .nav-tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(201,168,76,0.05); }
        
        /* GRID */
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; padding: 16px; }
        .car-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
            transition: var(--transition); position: relative;
            animation: fadeIn 0.3s ease;
        }
        .car-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: rgba(201,168,76,0.3); }
        .car-card.aging-60 { border-color: var(--orange); }
        .car-card.aging-90 { border-color: var(--red); background: rgba(224,85,85,0.05); }
        .car-card.compare-selected { border-color: var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.2); }
        .car-card.hot-deal { border-color: var(--red); }
        .car-card.recommended { border-color: var(--blue); }
        .car-card.price-drop { border-color: var(--green); }
        
        .car-image-wrap { position: relative; height: 200px; background: #0d0d0d; overflow: hidden; cursor: pointer; }
        .car-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .car-card:hover .car-image { transform: scale(1.05); }
        
        .car-badge {
            position: absolute; top: 10px; left: 10px;
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(0,0,0,0.7); border: 1px solid var(--gold);
            color: var(--gold); font-size: 10px; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
        }
        .status-badge {
            position: absolute; bottom: 10px; left: 10px;
            font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
        }
        .status-show { background: rgba(90,184,122,0.8); color: #fff; }
        .status-sold { background: rgba(224,85,85,0.8); color: #fff; }
        .status-hold { background: rgba(201,168,76,0.8); color: #000; }
        
        .tag-badge {
            position: absolute; top: 10px; right: 10px;
            font-size: 8px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
            text-transform: uppercase;
        }
        .tag-hot { background: var(--red); color: #fff; }
        .tag-recommended { background: var(--blue); color: #fff; }
        .tag-pricedrop { background: var(--green); color: #fff; }
        
        .car-body { padding: 14px; }
        .car-brand { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: 700; }
        .car-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; margin: 4px 0; }
        .car-info { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
        .car-info span { background: var(--bg-input); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
        .car-price { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--gold-light); }
        .car-price small { font-size: 12px; color: var(--text-secondary); }
        .car-actions { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; }
        
        .icon-btn {
            width: 32px; height: 32px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-secondary); font-size: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition);
        }
        .icon-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
        .icon-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.2); }
        
        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 2000;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 16px; padding: 24px; width: 95%; max-width: 600px;
            max-height: 90vh; overflow-y: auto;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            animation: slideUp 0.3s ease;
        }
        .modal-large { max-width: 900px; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); margin-bottom: 8px; }
        .modal-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
        
        /* FORM */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 12px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text-primary); font-size: 13px; font-family: inherit;
            transition: var(--transition);
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--gold); outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        /* TABLE */
        .compare-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .compare-table th { background: var(--bg-input); color: var(--gold); padding: 12px; text-align: center; border: 1px solid var(--border); font-weight: 700; }
        .compare-table td { padding: 12px; text-align: center; border: 1px solid var(--border); }
        .compare-best { color: var(--green); font-weight: 700; }
        
        /* PIPELINE */
        .pipeline-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
        .pipeline-col { background: var(--bg-input); border-radius: 12px; padding: 16px; min-height: 300px; }
        .pipeline-header { font-weight: 700; font-size: 14px; margin-bottom: 12px; text-align: center; }
        .pipeline-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; cursor: pointer; transition: var(--transition); }
        .pipeline-card:hover { border-color: var(--gold); transform: translateY(-2px); }
        
        /* TAG CHIPS */
        .tag-chip {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            border: 1px solid var(--border); background: var(--bg-input);
            color: var(--text-secondary);
        }
        .tag-chip.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
        .tag-chip.hot.active { border-color: var(--red); color: var(--red); background: rgba(224,85,85,0.1); }
        .tag-chip.recommended.active { border-color: var(--blue); color: var(--blue); background: rgba(85,153,238,0.1); }
        .tag-chip.pricedrop.active { border-color: var(--green); color: var(--green); background: rgba(90,184,122,0.1); }
        
        /* CHAT FLOAT */
        .chat-widget {
            position: fixed; bottom: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-btn {
            width: 56px; height: 56px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            transition: var(--transition); font-size: 24px; border: none;
        }
        .chat-btn:hover { transform: scale(1.1); }
        .chat-btn.line { background: #06c755; color: #fff; }
        .chat-btn.messenger { background: #0084ff; color: #fff; }
        .chat-btn.phone { background: var(--gold); color: #000; }
        
        /* TOAST */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 9999; padding: 12px 24px;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; font-size: 13px;
            box-shadow: var(--shadow); animation: toastIn 0.3s ease;
        }
        @keyframes toastIn { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        
        /* USER MENU */
        .user-dropdown {
            position: fixed; z-index: 9999;
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 12px; padding: 8px; min-width: 220px;
            box-shadow: var(--shadow); animation: fadeIn 0.2s ease;
        }
        .user-dropdown button {
            width: 100%; justify-content: flex-start; margin-bottom: 4px;
        }
        
        @media print {
            body { background: #fff !important; color: #000 !important; }
            .topbar, .chat-widget, .nav-tabs, .stats-bar, .car-actions, .no-print { display: none !important; }
        }
        @media (max-width: 768px) {
            .car-grid { grid-template-columns: 1fr; }
            .pipeline-container { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ==================== TOPBAR ==================== -->
<div class="topbar">
    <div class="logo" onclick="handleLogoClick()">🚗 Stock CEO</div>
    <span id="syncStatus" style="font-size:10px;color:var(--text-secondary)">💾 Local</span>
    <div class="spacer"></div>
    <input type="text" id="searchInput" placeholder="🔍 ค้นหารถ..." style="width:200px;padding:8px 12px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:12px" oninput="debounceFilter()">
    <select id="sortSelect" onchange="handleSort()" style="padding:8px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:12px">
        <option value="name-asc">🔤 ชื่อ ก-ฮ</option>
        <option value="name-desc">🔤 ชื่อ ฮ-ก</option>
        <option value="price-asc">💰 ต่ำ→สูง</option>
        <option value="price-desc">💰 สูง→ต่ำ</option>
        <option value="year-desc">📅 ใหม่→เก่า</option>
        <option value="year-asc">📅 เก่า→ใหม่</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="toggleEditMode()" id="lockBtn" style="display:none">🔒 ดู</button>
    <span id="userInfo" style="font-size:11px;color:var(--text-secondary);cursor:pointer" onclick="showUserMenu()">👁️ Viewer</span>
    <span id="authSection">
        <button class="btn btn-outline btn-sm" onclick="showAuthModal()">🔑 เข้าสู่ระบบ</button>
    </span>
    <button class="btn btn-primary btn-sm admin-only" onclick="openAddCarModal()">＋ เพิ่มรถ</button>
</div>

<!-- ==================== STATS ==================== -->
<div class="stats-bar" id="statsBar"></div>

<!-- ==================== NAV TABS ==================== -->
<div class="nav-tabs" id="navTabs"></div>

<!-- ==================== TAG FILTERS ==================== -->
<div style="padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap" id="tagFilters"></div>

<!-- ==================== PANELS ==================== -->
<div id="stockPanel" class="panel">
    <div style="padding:8px 16px;display:flex;gap:8px;flex-wrap:wrap" id="filterChips"></div>
    <div class="car-grid" id="carGrid"></div>
</div>

<div id="comparePanel" class="panel" style="display:none;padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div>
            <h2 style="font-family:'Playfair Display',serif;color:var(--gold)">⚖️ เปรียบเทียบรถ</h2>
            <p style="font-size:12px;color:var(--text-secondary)">เลือกได้สูงสุด 5 คัน | กด ⚖️ บนการ์ดรถ</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="shareCompareLink()">🔗 แชร์ลิงก์</button>
            <button class="btn btn-outline btn-sm" onclick="printCompare()">🖨️ พิมพ์</button>
            <button class="btn btn-danger btn-sm" onclick="clearCompare()">✕ ล้าง</button>
        </div>
    </div>
    <div id="compareContent"></div>
</div>

<div id="reportPanel" class="panel" style="display:none;padding:16px">
    <div id="reportContent"></div>
</div>

<div id="pipelinePanel" class="panel" style="display:none;padding:16px">
    <div class="pipeline-container" id="pipelineContent"></div>
</div>

<div id="calendarPanel" class="panel" style="display:none;padding:16px">
    <div id="calendarContainer"></div>
</div>

<div id="alertsPanel" class="panel" style="display:none;padding:16px">
    <div id="alertsContent"></div>
</div>

<!-- ==================== CHAT WIDGET ==================== -->
<div class="chat-widget">
    <button class="chat-btn compare-float" id="compareFloatBtn" onclick="switchTab('compare')" style="background:var(--bg-card);color:var(--gold);border:2px solid var(--gold);font-size:14px;font-weight:700;display:none">
        ⚖️<span id="compareFloatCount">0</span>
    </button>
    <button class="chat-btn phone" onclick="window.location.href='tel:0649246689'">📞</button>
    <button class="chat-btn line" onclick="window.open('https://line.me/ti/p/~ocshop518','_blank')">💚</button>
    <button class="chat-btn messenger" onclick="window.open('https://m.me/stockceo','_blank')">💬</button>
</div>

<!-- ==================== MODALS ==================== -->
<div class="modal-overlay" id="authModal">
    <div class="modal" style="max-width:420px">
        <div class="modal-title">🔐 เข้าสู่ระบบ</div>
        <div class="modal-subtitle">เข้าสู่ระบบเพื่อใช้งานฟีเจอร์ทั้งหมด</div>
        <div class="form-group"><label>อีเมล</label><input type="email" id="authEmail" placeholder="your@email.com" autocomplete="email"></div>
        <div class="form-group"><label>รหัสผ่าน</label><input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password"></div>
        <div id="authError" style="color:var(--red);font-size:12px;margin-bottom:8px;display:none"></div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-outline" onclick="closeModal('authModal')" style="flex:1">ยกเลิก</button>
            <button class="btn btn-primary" onclick="handleLogin()" style="flex:1">เข้าสู่ระบบ</button>
        </div>
        <p style="text-align:center;margin-top:12px;font-size:11px;color:var(--text-secondary)">
            ยังไม่มีบัญชี? <a href="#" onclick="closeModal('authModal');showRegisterModal()" style="color:var(--gold)">สมัครสมาชิก</a>
            <br><a href="#" onclick="closeModal('authModal');showResetPasswordModal()" style="color:var(--text-secondary);font-size:10px">ลืมรหัสผ่าน?</a>
        </p>
    </div>
</div>

<div class="modal-overlay" id="addCarModal">
    <div class="modal">
        <div class="modal-title">＋ เพิ่มรถใหม่</div>
        <div class="form-row">
            <div class="form-group"><label>ยี่ห้อ</label><input type="text" id="carBrand" placeholder="BMW"></div>
            <div class="form-group"><label>รุ่น</label><input type="text" id="carName" placeholder="330e M Sport"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>ปี</label><input type="number" id="carYear" placeholder="2022"></div>
            <div class="form-group"><label>สี</label><input type="text" id="carColor" placeholder="ขาว"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>ทะเบียน</label><input type="text" id="carPlate" placeholder="กข 1234"></div>
            <div class="form-group"><label>เลขไมล์</label><input type="text" id="carMileage" placeholder="50,000"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>ราคา SP</label><input type="text" id="carSP" placeholder="1,490,000"></div>
            <div class="form-group"><label>ราคา Net</label><input type="text" id="carNet" placeholder="1,390,000"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>สถานที่จอด</label><input type="text" id="carLocation" placeholder="ลาดพร้าว"></div>
            <div class="form-group"><label>Tags</label>
                <select id="carTags" multiple style="height:80px">

// ==================== UTILS ====================
function formatBaht(num) { return new Intl.NumberFormat('th-TH', { style: 'currency', currency: 'THB', maximumFractionDigits: 0 }).format(num || 0); }
function parsePrice(str) { return parseFloat(String(str).replace(/[^0-9.-]/g, '')) || 0; }
function esc(str) { return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function calculateCost(car) { const c = car.cost || { purchase: 0, repair: 0, other: 0 }; return { ...c, total: (c.purchase||0) + (c.repair||0) + (c.other||0) }; }
function calculateProfit(car) { if (car.status !== 'sold') return { profit: 0, margin: 0, commission: 0 }; const net = parsePrice(car.net); const cost = calculateCost(car).total; const profit = net - cost; return { profit, margin: net ? (profit/net)*100 : 0, commission: profit * (siteSettings.commissionRate/100) }; }
function getAgingDays(car) { if (!car.dateAdded) return 0; return Math.ceil((new Date() - new Date(car.dateAdded)) / (1000*60*60*24)); }

}

async function handleRegister(modalEl) {
    const email = modalEl.querySelector('#regEmail').value.trim();
    const password = modalEl.querySelector('#regPassword').value;
    const passwordConfirm = modalEl.querySelector('#regPasswordConfirm').value;
    const errorEl = modalEl.querySelector('#regError');
    
    if (!email || !password) { errorEl.textContent = '❌ กรุณากรอกอีเมลและรหัสผ่าน'; errorEl.style.display = 'block'; return; }
    if (password.length < 6) { errorEl.textContent = '❌ รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'; errorEl.style.display = 'block'; return; }

    try {
        await auth.createUserWithEmailAndPassword(email, password);

        showToast('✅ สมัครสมาชิกสำเร็จ! ยินดีต้อนรับ');

        errorEl.textContent = msg; errorEl.style.display = 'block';
    }
}

    const password = document.getElementById('authPassword').value;
    const errorEl = document.getElementById('authError');
    
    if (!email || !password) { errorEl.textContent = '❌ กรุณากรอกอีเมลและรหัสผ่าน'; errorEl.style.display = 'block'; return; }

if (firebaseReady && auth) {
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            currentUser = user;
            try {
                const snap = await db.ref('users/' + user.uid + '/role').once('value');
                let role = snap.val();
                if (!role) {
                    const isFirst = !localStorage.getItem('stockCEO_initialized');
                    role = isFirst ? 'admin' : 'user';
                    await db.ref('users/' + user.uid).set({ email: user.email, role, createdAt: Date.now(), lastLogin: Date.now() });

                } else {
                    await db.ref('users/' + user.uid + '/lastLogin').set(Date.now());

function getFilteredCars() {
    let filtered = [...cars];
    const q = (document.getElementById('searchInput')?.value || '').toLowerCase();
    if (activeFilter !== 'all') filtered = filtered.filter(c => c.brand === activeFilter);
    if (activeStatusFilter) filtered = filtered.filter(c => c.status === activeStatusFilter);
    if (activeTagFilter) filtered = filtered.filter(c => (c.tags || []).includes(activeTagFilter));
    if (q) filtered = filtered.filter(c => [c.brand, c.name, c.plate, c.color, String(c.year), c.location].some(v => (v||'').toLowerCase().includes(q)));
    
    if (currentSort === 'name-asc') filtered.sort((a,b) => (a.name||'').localeCompare(b.name||'','th'));
    else if (currentSort === 'name-desc') filtered.sort((a,b) => (b.name||'').localeCompare(a.name||'','th'));
    else if (currentSort === 'price-asc') filtered.sort((a,b) => parsePrice(a.net) - parsePrice(b.net));
    else if (currentSort === 'price-desc') filtered.sort((a,b) => parsePrice(b.net) - parsePrice(a.net));
    else if (currentSort === 'year-desc') filtered.sort((a,b) => (b.year||0) - (a.year||0));
    else if (currentSort === 'year-asc') filtered.sort((a,b) => (a.year||0) - (b.year||0));
    return filtered;
}

        if (compareIds.length >= MAX_COMPARE) { showToast(`⚠️ สูงสุด ${MAX_COMPARE} คัน`, 'err'); return; }

            <button class="btn btn-outline" onclick="closeModal('contractModal')" style="flex:1">ยกเลิก</button>
            <button class="btn btn-primary" onclick="generateContract(${id})" style="flex:1">📝 สร้าง PDF</button>
        </div>
    `;
    modal.classList.add('open');
}

function generateContract(id) {
    const car = cars.find(c => c.id === id);
    if (!car) return;
    const buyer = document.getElementById('buyerName').value || '_______________';
    const price = document.getElementById('contractPrice').value || car.net;
    const deposit = document.getElementById('contractDeposit').value || '0';
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(18);
    doc.text('สัญญาซื้อขายรถยนต์', 105, 20, { align: 'center' });
    doc.setFontSize(10);
    doc.text(`วันที่: ${new Date().toLocaleDateString('th-TH')}`, 105, 28, { align: 'center' });
    doc.setFontSize(12);
    doc.text(`ผู้ขาย: ${siteSettings.name} (064-924-6689)`, 14, 40);
    doc.text(`ผู้ซื้อ: ${buyer}`, 14, 48);
    doc.text(`รถ: ${car.brand} ${car.name} ปี ${car.year} สี ${car.color} ทะเบียน ${car.plate}`, 14, 58);
    doc.text(`ราคาซื้อขาย: ${price} บาท | เงินมัดจำ: ${deposit} บาท`, 14, 68);
    doc.text('ลงชื่อ ____________________ ผู้ขาย', 14, 100);
    doc.text('ลงชื่อ ____________________ ผู้ซื้อ', 120, 100);
    doc.save(`สัญญา_${car.brand}_${car.name}.pdf`);
    showToast('📝 สร้างสัญญา PDF แล้ว');
}

// ==================== ADD/EDIT/DELETE ====================
function openAddCarModal() {
    if (!hasPerm('edit')) return;
    ['carBrand','carName','carYear','carColor','carPlate','carMileage','carSP','carNet','carLocation','carNote'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('carTags').selectedIndex = -1;
    document.getElementById('addCarModal').classList.add('open');
}

function handleAddCar() {
    const car = {
        id: Date.now(),
        brand: document.getElementById('carBrand').value || 'Unknown',
        name: document.getElementById('carName').value || 'No Name',
        year: parseInt(document.getElementById('carYear').value) || new Date().getFullYear(),
        color: document.getElementById('carColor').value || '-',
        plate: document.getElementById('carPlate').value || '',
        mileage: document.getElementById('carMileage').value || '-',
        sp: document.getElementById('carSP').value || '0',
        net: document.getElementById('carNet').value || '0',
        location: document.getElementById('carLocation').value || '',
        note: document.getElementById('carNote').value || '',
        status: 'show',
        images: [PLACEHOLDER_IMG],
        cost: { purchase: 0, repair: 0, other: 0 },
        dateAdded: new Date().toISOString().split('T')[0],
        warranty: {},
        tags: Array.from(document.getElementById('carTags').selectedOptions).map(o => o.value),
        salesPerson: currentUser?.email?.split('@')[0] || ''
    };
    cars.unshift(car);
    saveData();
    closeModal('addCarModal');
    renderAll();
    showToast('✅ เพิ่มรถแล้ว');
}

function editCar(id) {
    const car = cars.find(c => c.id === id);
    if (!car || !hasPerm('edit')) return;
    const modal = document.getElementById('carDetailModal');
    modal.querySelector('#carDetailContent').innerHTML = `
        <div class="modal-title">✏️ แก้ไข</div>
        <div class="form-row">
            <div class="form-group"><label>ยี่ห้อ</label><input type="text" id="eb" value="${esc(car.brand)}"></div>
            <div class="form-group"><label>รุ่น</label><input type="text" id="en" value="${esc(car.name)}"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>ราคา Net</label><input type="text" id="eNet" value="${esc(car.net)}"></div>
            <div class="form-group"><label>สถานะ</label><select id="eSt"><option value="show" ${car.status==='show'?'selected':''}>🟢 จอดโชว์</option><option value="hold" ${car.status==='hold'?'selected':''}>🟡 จอง</option><option value="sold" ${car.status==='sold'?'selected':''}>🔴 ขายแล้ว</option></select></div>
        </div>
        <div class="form-group"><label>Tags</label><select id="eTags" multiple style="height:60px"><option value="hot" ${(car.tags||[]).includes('hot')?'selected':''}>🔥 รถร้อน</option><option value="recommended" ${(car.tags||[]).includes('recommended')?'selected':''}>⭐ แนะนำ</option><option value="pricedrop" ${(car.tags||[]).includes('pricedrop')?'selected':''}>💰 ลดราคา</option></select></div>
        <div style="display:flex;gap:8px">
            <button class="btn btn-outline" onclick="closeModal('carDetailModal')" style="flex:1">ยกเลิก</button>
            <button class="btn btn-primary" onclick="saveEdit(${id})" style="flex:1">บันทึก</button>
        </div>
    `;
    modal.classList.add('open');
}

function saveEdit(id) {
    const car = cars.find(c => c.id === id);
    if (!car) return;
    const oldStatus = car.status;
    car.brand = document.getElementById('eb').value;
    car.name = document.getElementById('en').value;
    car.net = document.getElementById('eNet').value;
    car.status = document.getElementById('eSt').value;
    car.tags = Array.from(document.getElementById('eTags').selectedOptions).map(o => o.value);
    if (car.status === 'sold') car.soldDate = new Date().toISOString().split('T')[0];
    saveData();
    closeModal('carDetailModal');
    renderAll();
    showToast('✅ บันทึกแล้ว');
    if (oldStatus !== 'sold' && car.status === 'sold') {
        const profit = calculateProfit(car);
        sendLineNotify(`💰 ขายแล้ว!\n${car.brand} ${car.name}\nราคา: ${car.net} บาท\nกำไร: ${formatBaht(profit.profit)}`);
    }
}

function deleteCar(id) {
    if (!hasPerm('delete')) return;
    if (!confirm('ยืนยันการลบ?')) return;
    cars = cars.filter(c => c.id !== id);
    compareIds = compareIds.filter(i => i !== id);
    saveData(); renderAll(); showToast('🗑️ ลบแล้ว');
}

// ==================== TAB SWITCHING ====================
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    const panel = document.getElementById(tab + 'Panel');
    const navTab = document.querySelector(`[data-tab="${tab}"]`);
    if (panel) panel.style.display = 'block';
    if (navTab) navTab.classList.add('active');
    if (tab === 'compare') renderCompare();
    if (tab === 'report') renderReport();
    if (tab === 'pipeline') renderPipeline();
    if (tab === 'calendar') renderCalendar();
    if (tab === 'alerts') checkAlerts();
}

// ==================== REPORT ====================
function renderReport() {
    if (!hasPerm('report')) return;
    document.getElementById('reportContent').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px">
            <div class="stat-card"><div class="stat-value">${cars.length}</div><div class="stat-label">ทั้งหมด</div></div>
            <div class="stat-card"><div class="stat-value" style="color:var(--red)">${cars.filter(c=>c.status==='sold').length}</div><div class="stat-label">ขายแล้ว</div></div>
            <div class="stat-card"><div class="stat-value">${formatBaht(cars.reduce((s,c)=>s+parsePrice(c.net),0))}</div><div class="stat-label">มูลค่ารวม</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <canvas id="brandChart"></canvas>
            <canvas id="statusChart"></canvas>
        </div>
    `;
    setTimeout(() => {
        const brands = {}; cars.forEach(c => brands[c.brand] = (brands[c.brand]||0) + 1);
        const ctx1 = document.getElementById('brandChart');
        if (ctx1) new Chart(ctx1, { type: 'bar', data: { labels: Object.keys(brands), datasets: [{ label: 'จำนวน', data: Object.values(brands), backgroundColor: '#c9a84c' }] } });
        const ctx2 = document.getElementById('statusChart');
        if (ctx2) new Chart(ctx2, { type: 'doughnut', data: { labels: ['จอดโชว์','จอง','ขายแล้ว'], datasets: [{ data: [cars.filter(c=>c.status==='show').length, cars.filter(c=>c.status==='hold').length, cars.filter(c=>c.status==='sold').length], backgroundColor: ['#5ab87a','#c9a84c','#e05555'] }] } });
    }, 200);
}

// ==================== PIPELINE ====================
function renderPipeline() {
    const allLeads = Object.entries(crmData).flatMap(([carId, leads]) => leads.map(l => ({...l, carId: parseInt(carId)})));
    const stages = ['contact','meeting','negotiate','sold'];
    const labels = { contact: '👤 สนใจ', meeting: '📅 นัดดูรถ', negotiate: '🔥 ต่อรอง', sold: '✅ ขายแล้ว' };
    const colors = { contact: 'var(--blue)', meeting: 'var(--gold)', negotiate: 'var(--orange)', sold: 'var(--green)' };
    
    document.getElementById('pipelineContent').innerHTML = stages.map(stage => {
        const leads = allLeads.filter(l => l.status === stage);
        return `<div class="pipeline-col"><div class="pipeline-header" style="color:${colors[stage]}">${labels[stage]} (${leads.length})</div>${leads.map(l => { const car = cars.find(c => c.id === l.carId); return `<div class="pipeline-card" onclick="openCarDetail(${l.carId})"><strong>${esc(l.name)}</strong><div style="font-size:10px;color:var(--text-secondary)">📱 ${esc(l.tel)}</div>${car?`<div style="font-size:10px;color:var(--gold)">🚗 ${esc(car.brand)} ${esc(car.name)}</div>`:''}</div>`; }).join('')}${!leads.length?'<div style="text-align:center;color:var(--text-secondary);padding:20px">— ว่าง —</div>':''}</div>`;
    }).join('');
}

// ==================== CALENDAR ====================
let calendarInstance = null;
function renderCalendar() {
    const container = document.getElementById('calendarContainer');
    if (!container) return;
    if (calendarInstance) calendarInstance.destroy();
    calendarInstance = new FullCalendar.Calendar(container, {
        initialView: 'dayGridMonth', locale: 'th',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth' },
        events: appointments.map(a => ({ id: a.id, title: `${a.name} - ${a.carName||'นัดดูรถ'}`, start: a.date, backgroundColor: '#c9a84c' })),
        dateClick: function(info) {
            if (!hasPerm('calendar')) return;
            const name = prompt('ชื่อลูกค้า:'); if (!name) return;
            appointments.push({ id: Date.now(), name, date: info.dateStr, type: 'viewing', note: '' });
            localStorage.setItem('stockCEO_appointments', JSON.stringify(appointments));
            renderCalendar(); showToast('✅ เพิ่มนัดหมายแล้ว');
        }
    });
    calendarInstance.render();
}

// ==================== ALERTS ====================
function checkAlerts() {
    const alerts = [];
    cars.forEach(c => {
        if (c.warranty?.end) {
            try {
                const parts = c.warranty.end.split('/');
                const endDate = new Date(parseInt(parts[2])-543, parseInt(parts[1])-1, parseInt(parts[0]));
                const daysLeft = Math.ceil((endDate - new Date()) / (1000*60*60*24));
                if (daysLeft <= 0) alerts.push({ type: 'danger', msg: `⚠️ Warranty หมดอายุ: ${c.brand} ${c.name}`, carId: c.id });
                else if (daysLeft <= 30) alerts.push({ type: 'warn', msg: `⏳ Warranty ใกล้หมด: ${c.brand} ${c.name} อีก ${daysLeft} วัน`, carId: c.id });
            } catch(e) {}
        }
        if (c.status === 'show') {
            const aging = getAgingDays(c);
            if (aging > 90) alerts.push({ type: 'danger', msg: `📦 Dead Stock ${aging} วัน: ${c.brand} ${c.name}`, carId: c.id });
            else if (aging > 60) alerts.push({ type: 'warn', msg: `⏰ จอดนาน ${aging} วัน: ${c.brand} ${c.name}`, carId: c.id });
        }
    });
    
    const container = document.getElementById('alertsContent');
    if (container) {
        container.innerHTML = alerts.length ? alerts.map(a => `
            <div style="padding:12px;margin-bottom:8px;background:var(--bg-input);border:1px solid ${a.type==='danger'?'var(--red)':'var(--orange)'};border-radius:8px;cursor:pointer" onclick="openCarDetail(${a.carId})">${a.msg}</div>
        `).join('') : '<div style="text-align:center;padding:40px;color:var(--text-secondary)">✅ ไม่มีการแจ้งเตือน</div>';
    }
}

// ==================== LINE NOTIFY ====================
async function sendLineNotify(msg) {
    if (!lineNotifyToken) return;
    try { await fetch('https://notify-api.line.me/api/notify', { method: 'POST', headers: { 'Authorization': `Bearer ${lineNotifyToken}` }, body: `message=${encodeURIComponent(msg)}` }); } catch(e) {}
}

// ==================== INIT ====================
function init() {
    loadData();
    renderNavTabs();
    renderAll();
    updateAuthUI();
    
    const params = new URLSearchParams(window.location.search);
    const compareParam = params.get('compare');
    if (compareParam) {
        compareIds = compareParam.split(',').map(Number).filter(id => cars.find(c => c.id === id)).slice(0, MAX_COMPARE);
        updateCompareUI();
        if (compareIds.length) switchTab('compare');
    }
    
    switchTab('stock');
}

document.addEventListener('DOMContentLoaded', init);
